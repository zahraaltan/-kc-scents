<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        background-color: rgb(226, 193, 153);
    }
    a { color: rgb(117, 85, 14); }
    .cart-items {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
    }
    .card img {
        width: 150px;
        height: 150px;
        object-fit: cover;
    }
    .remove-btn {
        margin: 0.2rem;
        border: 2px solid rgb(117, 85, 14);
        background: transparent;
        cursor: pointer;
        color: red;
    }
    .qty-btn {
        margin: 0 4px;
        padding: 2px 8px;
        border: 1px solid rgb(117, 85, 14);
        background: transparent;
        cursor: pointer;
        font-size: 1rem;
    }
    .footer{
        background-color: rgb(226, 193, 153) ;
        border-top: 2px solid rgb(117, 85, 14);
        margin-top: 2rem;
    }
</style>
<body>
    <div class="navbar">
        <img src="logo.png" alt="" class="logo">
        <nav><a href="index.html">ℌ𝔬𝔪𝔢</a></nav>
        <nav><a href="about.html">𝔄𝔟𝔬𝔲𝔱</a></nav>
        <nav><a href="contact.html">ℭ𝔬𝔫𝔱𝔞𝔠𝔱</a></nav>
        <nav><a href="shop.html">𝔰𝔥𝔬𝔭</a></nav>
        <nav><a href="cart.html">ℭ𝔞𝔯𝔱</a></nav>
    </div>

    <h1>𝔜𝔬𝔲𝔯 ℭ𝔞𝔯𝔱 "<span id="item-count">0</span> items"</h1>
    <div class="cart-items"></div>

    <section class="checkout">
        <h1>Subtotal: <span id="subtotal">PKR 0</span></h1>
        <button><a href="checkout.html">Checkout</a></button>
    </section>
    <section class="footer">
        <div class="fot">
            <h1 style="padding: 3rem;">𝔗𝔥𝔢 𝔄𝔯𝔱 𝔒𝔣 𝔓𝔢𝔯𝔣𝔲𝔪𝔢</h1>
            <p style="font-size: 1.5rem; text-align: center; font-family: sans-serif;">join our exclusive newsletter for the latest in luxuary fashion fragrances</p>
            <input type="email" placeholder=" enter your email">
            <img style="display: block; margin-left: auto; margin-right: auto; " class="logo" src="logo.png" alt="">
        </div>
    </section>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderCart() {
            const cartItems = document.querySelector(".cart-items");
            cartItems.innerHTML = ""; 

            if (cart.length === 0) {
                cartItems.innerHTML = "<p style='text-align:center; font-size:1.2rem;'>Your cart is empty.</p>";
                document.getElementById('item-count').textContent = 0;
                document.getElementById('subtotal').textContent = "PKR 0";
                return;
            }

            let total = 0;
            let totalItems = 0;

            for (const item of cart) {
                total += item.price * item.quantity;
                totalItems += item.quantity;

                let card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <img class="image" src="${item.image}" alt="${item.name}"
                         onerror="this.src='logo.png'">
                    <h2 class="name">${item.name}</h2>
                    <p>PKR ${item.price.toLocaleString()}</p>
                    <div style="display:flex; align-items:center; justify-content:center;">
                        <button class="qty-btn" onclick="changeQty('${item.name}', -1)">−</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQty('${item.name}', 1)">+</button>
                    </div>
                    <button class="remove-btn" onclick="removeItem('${item.name}')">Remove ✕</button>
                `;
                cartItems.appendChild(card);
            }

            document.getElementById('item-count').textContent = totalItems;
            document.getElementById('subtotal').textContent = "PKR " + total.toLocaleString();
        }

        function changeQty(name, delta) {
            let item = cart.find(i => i.name === name);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.name !== name);
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        function removeItem(name) {
            cart = cart.filter(i => i.name !== name);
            localStorage.setItem('cart', JSON.stringify(cart));
            renderCart();
        }

        renderCart();
    </script>
</body>
</html>
